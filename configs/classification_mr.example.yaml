experiment:
  name: mr_convnext_14ch_attention_32
  seed: 42
data:
  root: data/processed/training_samples/mr
  image_size: 32
  input_channels: 14
  classes: 5
model:
  name: convnext_tiny
  pretrained: true
  attention:
    enabled: true
    type: class_sensitive_channel
training:
  epochs: 60
  batch_size: 16
  learning_rate: 0.00001
  weight_decay: 0.0001
  num_workers: 4
  output_directory: outputs/runs/mr_convnext_14ch_attention_32
